<svg width="800" viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:Inter,sans-serif;">
  <title>QueueCure — Socket Event Diagram</title>
  <desc>WebSocket event flow between Receptionist client, Server, and Patient clients</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0a0a0a">QueueCure — Socket Event Diagram</text>

  <!-- Column headers -->
  <rect x="50" y="44" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="130" y="71" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Receptionist</text>

  <rect x="320" y="44" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="400" y="71" text-anchor="middle" font-size="14" font-weight="600" fill="#444441">Server (Node.js)</text>

  <rect x="590" y="44" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="670" y="71" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Patient screens</text>

  <!-- Lifelines -->
  <line x1="130" y1="88" x2="130" y2="500" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="400" y1="88" x2="400" y2="500" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="670" y1="88" x2="670" y2="500" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- on connect -->
  <text x="400" y="116" text-anchor="middle" font-size="11" fill="#888">on connect</text>
  <line x1="400" y1="124" x2="133" y2="144" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="124" x2="667" y2="144" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="260" y="120" text-anchor="middle" font-size="11" fill="#888">state_update</text>
  <text x="540" y="120" text-anchor="middle" font-size="11" fill="#888">state_update</text>

  <!-- add_patient -->
  <text x="50" y="174" font-size="10" fill="#aaa">add patient</text>
  <line x1="133" y1="186" x2="397" y2="186" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="180" text-anchor="middle" font-size="11" fill="#7F77DD">add_patient {name}</text>
  <line x1="400" y1="200" x2="133" y2="214" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="200" x2="667" y2="214" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="260" y="199" text-anchor="middle" font-size="11" fill="#888">state_update</text>
  <text x="540" y="199" text-anchor="middle" font-size="11" fill="#888">state_update</text>

  <!-- call_next -->
  <text x="50" y="244" font-size="10" fill="#aaa">call next</text>
  <line x1="133" y1="256" x2="397" y2="256" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="250" text-anchor="middle" font-size="11" fill="#7F77DD">call_next</text>
  <line x1="400" y1="272" x2="133" y2="286" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="272" x2="667" y2="286" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="260" y="271" text-anchor="middle" font-size="11" fill="#888">state_update</text>
  <text x="540" y="271" text-anchor="middle" font-size="11" fill="#888">state_update</text>

  <!-- set_avg_time -->
  <text x="50" y="316" font-size="10" fill="#aaa">set time</text>
  <line x1="133" y1="328" x2="397" y2="328" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="322" text-anchor="middle" font-size="11" fill="#7F77DD">set_avg_time {minutes}</text>
  <line x1="400" y1="344" x2="133" y2="358" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="344" x2="667" y2="358" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="260" y="343" text-anchor="middle" font-size="11" fill="#888">state_update</text>
  <text x="540" y="343" text-anchor="middle" font-size="11" fill="#888">state_update</text>

  <!-- reset_queue -->
  <text x="50" y="388" font-size="10" fill="#aaa">reset</text>
  <line x1="133" y1="400" x2="397" y2="400" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="394" text-anchor="middle" font-size="11" fill="#7F77DD">reset_queue</text>
  <line x1="400" y1="416" x2="133" y2="430" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="416" x2="667" y2="430" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="260" y="415" text-anchor="middle" font-size="11" fill="#888">state_update</text>
  <text x="540" y="415" text-anchor="middle" font-size="11" fill="#888">state_update</text>

  <!-- Legend -->
  <line x1="50" y1="470" x2="80" y2="470" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="86" y="474" font-size="11" fill="#555">client → server (command)</text>
  <line x1="360" y1="470" x2="390" y2="470" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="396" y="474" font-size="11" fill="#555">server → all clients (broadcast)</text>
</svg>
